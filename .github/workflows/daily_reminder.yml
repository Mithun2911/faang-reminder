name: FAANG Daily Reminder

on:
  schedule:
    - cron: '30 1 * * *'  # 7:00 AM IST
  workflow_dispatch:

jobs:
  send-email:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Run reminder script
        env:
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: python faang_reminder.py

      - name: Save updated config
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add config.json
          git diff --staged --quiet || git commit -m "Auto advance day"
          git push
